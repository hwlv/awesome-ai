<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status {
            font-size: 12px;
            color: #38ef7d;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.user .content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .content {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 16px 24px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            height: 48px;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #667eea; }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite both;
            margin-right: 4px;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .welcome h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #bbb;
        }

        .welcome p { margin: 8px 0; font-size: 14px; }

        .suggestions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .suggestion {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
        }

        .suggestion:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI 问答助手</h1>
        <span class="status" id="status">● 已连接</span>
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome">
            <h2>👋 你好，有什么可以帮你的？</h2>
            <p>我是一个 AI 助手，可以回答编程和 AI 相关的问题</p>
            <div class="suggestions">
                <span class="suggestion" onclick="sendSuggestion(this)">解释什么是 RAG</span>
                <span class="suggestion" onclick="sendSuggestion(this)">用 Python 写快速排序</span>
                <span class="suggestion" onclick="sendSuggestion(this)">PyTorch 和 TensorFlow 的区别</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input" placeholder="输入你的问题..." rows="1"></textarea>
            <button id="btn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        let convId = null;
        let hasMessages = false;

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        function sendSuggestion(el) {
            input.value = el.textContent;
            send();
        }

        function addMsg(role, content) {
            if (!hasMessages) {
                chat.innerHTML = '';
                hasMessages = true;
            }
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="content">${content}</div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            btn.disabled = true;

            addMsg('user', msg);
            const loading = addMsg('assistant',
                '<div class="typing"><span></span><span></span><span></span></div>');

            try {
                const res = await fetch(`${API}/api/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        conversation_id: convId,
                        stream: true
                    })
                });

                convId = res.headers.get('X-Conversation-Id') || convId;

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let reply = '';
                loading.querySelector('.content').textContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    for (const line of text.split('\n').filter(l => l.startsWith('data: '))) {
                        const data = JSON.parse(line.slice(6));
                        if (!data.done) {
                            reply += data.token;
                            loading.querySelector('.content').textContent = reply;
                            chat.scrollTop = chat.scrollHeight;
                        }
                    }
                }
            } catch (e) {
                loading.querySelector('.content').textContent =
                    '⚠️ 请求失败，请确认后端服务已启动 (uvicorn backend.app:app --reload)';
                document.getElementById('status').textContent = '● 未连接';
                document.getElementById('status').style.color = '#ef4444';
            }

            btn.disabled = false;
            input.focus();
        }

        // 健康检查
        fetch(`${API}/health`).then(r => r.json()).then(d => {
            document.getElementById('status').textContent = '● 已连接';
        }).catch(() => {
            document.getElementById('status').textContent = '● 未连接';
            document.getElementById('status').style.color = '#ef4444';
        });
    </script>
</body>
</html>
